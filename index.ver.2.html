// ═══ サウンドエンジン（Web Audio API）═══
const _audioCtxRef = { current: null };
function getAudioCtx() {
  if (!_audioCtxRef.current) {
    try { _audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtxRef.current;
}
function beep(freq, duration, type="square", volume=0.18, startDelay=0) {
  const ctx = getAudioCtx(); if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + startDelay);
  gain.gain.setValueAtTime(volume, ctx.currentTime + startDelay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startDelay + duration);
  osc.start(ctx.currentTime + startDelay);
  osc.stop(ctx.currentTime + startDelay + duration + 0.02);
}
// 通常チェック音（ピコッ↑）

}

const SCENE_DURATION = 8000;

function AnimatedLandscape({ onSceneChange }) {
  const [sceneIdx, setSceneIdx] = useState(0);
  const [fadeOut, setFadeOut] = useState(false);
  const [offset, setOffset] = useState(0);
  const rafRef = useRef(null);
  const lastTimeRef = useRef(null);
  const sceneTimerRef = useRef(null);

  useEffect(() => {
    const animate = (ts) => {
      if (lastTimeRef.current === null) lastTimeRef.current = ts;
      const dt = ts - lastTimeRef.current;
      lastTimeRef.current = ts;
      const speed = SCENES[sceneIdx].speed;
      setOffset(prev => (prev + speed * dt * 0.05) % 960);
      rafRef.current = requestAnimationFrame(animate);
    };
    rafRef.current = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(rafRef.current);
  }, [sceneIdx]);

  useEffect(() => {
    sceneTimerRef.current = setInterval(() => {
      setFadeOut(true);
      setTimeout(() => {
        setSceneIdx(prev => {
          const next = (prev + 1) % SCENES.length;
          onSceneChange && onSceneChange(next);
          return next;
        });
        setOffset(0);
        lastTimeRef.current = null;
        setFadeOut(false);
      }, 600);
    }, SCENE_DURATION);
    return () => clearInterval(sceneTimerRef.current);
  }, []);

  const scene = SCENES[sceneIdx];

  return (
    <div style={{ position:"relative", lineHeight:0, overflow:"hidden" }}>
      <svg
        width="480" height="80"
        viewBox="0 0 480 80"
        style={{
          display:"block",
          imageRendering:"pixelated",
          opacity: fadeOut ? 0 : 1,
          transition:"opacity 0.6s ease",
          width:"100%",
        }}
        xmlns="http://www.w3.org/2000/svg"
      >
        <scene.Component offset={offset}/>
      </svg>
      {/* シーンドット（中央） */}
      <div style={{
        position:"absolute", bottom:4, left:"50%", transform:"translateX(-50%)",
        display:"flex", gap:4,
      }}>
        {SCENES.map((s,i)=>(
          <div key={s.id} style={{
            width:4, height:4,
            background: i===sceneIdx ? "#FFD700" : "#FFFFFF55",
            border:"1px solid #FFFFFF44",
          }}/>
        ))}
      </div>
    </div>
  );
}

function getLvInfo(xp) {
  const x = Math.max(0, xp);
  let lv=1, base=0;
  while(true){
    const need = 100+(lv-1)*50;
    if(x < base+need) return { level:lv, currentXP:x-base, neededXP:need };
    base += need; lv++;
  }
}
function getCatLv(xp) {
  const x=Math.max(0,xp), lv=Math.min(Math.floor(x/50)+1,99);
  return { level:lv, currentXP:x%50, neededXP:50 };
}

function App() {

    if(!d.catXP)      d.catXP={};

    if(!d.categories) d.categories=DEFAULT_CATS;
    if(d.prevXP === undefined) {
      const tc = d.history[todayKey()] || {};
      let todaySum = 0;
      for(const cat of d.categories){
        for(const m of cat.missions){
          if(tc[m.id] && !m.dailyPart) todaySum += m.xp;
        }
      }
      const dc = d.categories.find(c=>c.id==="daily");
      if(dc?.missions.every(m=>tc[m.id])) todaySum += dc.bonus||10;
      d.prevXP = Math.max(0, d.totalXP - todaySum);
      d.prevCatXP = {};
    }
    return d;
  });
  const [todayChecked,setTodayChecked] = useState(()=>load().history[todayKey()]||{});
  const [tab,setTab] = useState("quest");
  const [toast,setToast] = useState(null);
  const [showEdit,setShowEdit] = useState(false);

    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToast(null),2200);
  }


  // ── Supabaseからデータを復元（初回起動時）──
  useEffect(() => {
    supabaseLoad().then(cloudData => {
      if (!cloudData) return;
      // クラウドのデータをlocalStorageと比較してより新しい方を使う
      const localXP = data.totalXP || 0;
      const cloudXP = cloudData.totalXP || 0;
      if (cloudXP >= localXP) {
        // クラウドの方が進んでいる（または同じ）→ クラウドを優先
        if (!cloudData.catXP)     cloudData.catXP = {};
        if (!cloudData.prevCatXP) cloudData.prevCatXP = {};

        if (cloudData.prevXP === undefined) cloudData.prevXP = 0;

        save(cloudData);
        showToast("☁️ クラウドから復元しました");
      }
    });
  }, []);

  function calcStats(checked, categories, prevXP) {
    let todayXP = 0;
    const catXP = {};
    for (const cat of categories) {
      for (const m of cat.missions) {
        if (!checked[m.id] || m.dailyPart) continue;
        todayXP += m.xp;
        if (cat.id !== "daily" && m.xp > 0) {
          catXP[cat.id] = (catXP[cat.id] || 0) + m.xp;
        }
      }
    }
    const dc = categories.find(c => c.id === "daily");
    const dailyDone = dc?.missions.every(m => !!checked[m.id]);
    if (dailyDone) todayXP += dc.bonus || 10;
    const totalXP = Math.max(0, prevXP + todayXP);
    const totalG  = Math.floor(totalXP / 10);
    return { totalXP, totalG, catXP, dailyDone };
  }

  function handleCheck(missionId, xp, isDailyPart) {
    const alreadyChecked = !!todayChecked[missionId];
    if (SLEEP_IDS.includes(missionId) && !alreadyChecked) {
      if (SLEEP_IDS.find(s => todayChecked[s])) {
        soundWarn();
        showToast("睡眠は1つだけ！"); return;
      }
    }
    const newChecked = { ...todayChecked };
    if (alreadyChecked) { delete newChecked[missionId]; }
    else { newChecked[missionId] = true; }
    const prevXP = data.prevXP ?? 0;
    const prevStats = calcStats(todayChecked, data.categories, prevXP);
    const nextStats = calcStats(newChecked,   data.categories, prevXP);
    const xpDiff = nextStats.totalXP - prevStats.totalXP;
    const gDiff  = nextStats.totalG  - prevStats.totalG;
    if (!prevStats.dailyDone && nextStats.dailyDone) {
      const dc = data.categories.find(c=>c.id==="daily");
      soundDailyBonus();
      showToast(`🌿 毎日ボーナス! +${dc?.bonus||10}XP`);
    } else if (alreadyChecked) {
      soundUncheck();
    } else if (xp < 0) {
      soundPenalty();
      showToast(`${xpDiff}XP ${gDiff}G`);
    } else {
      soundCheck();
      if (xpDiff !== 0) showToast(`+${xpDiff}XP +${gDiff}G`);
    }
    const newCatXP = { ...data.prevCatXP };
    for (const [k,v] of Object.entries(nextStats.catXP)) {
      newCatXP[k] = (newCatXP[k] || 0) + v;
    }
    const newData = {
      ...data,
      totalXP: nextStats.totalXP,
      totalG:  nextStats.totalG,
      catXP:   newCatXP,
      history: { ...data.history, [today]: newChecked },
    };
    setTodayChecked(newChecked);
    setData(newData);
    save(newData);
  }

  const [lastDate, setLastDate] = useState(todayKey());
  if (lastDate !== todayKey()) {
    const newPrevXP = data.totalXP;
    const newPrevCatXP = { ...data.catXP };
    const newData = { ...data, prevXP: newPrevXP, prevCatXP: newPrevCatXP };
    setData(newData);
    save(newData);
    setTodayChecked({});
    setLastDate(todayKey());
  }

  function handleSaveCategories(newCats){
    const newData = { ...data, categories:newCats };
    setData(newData); save(newData);
    setShowEdit(false); showToast("💾 保存しました！");
  }

  // ── データエクスポート（JSONダウンロード）──
  function handleExport() {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `questlife_backup_${todayKey()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("📦 バックアップ完了！");
  }

  // ── データインポート（JSONファイル読み込み）──
  const importRef = useRef(null);
  function handleImport(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!imported.totalXP === undefined || !imported.history) throw new Error("invalid");
        setData(imported);
        setTodayChecked(imported.history[todayKey()] || {});
        save(imported);
        showToast("✅ インポート成功！");
      } catch {
        showToast("❌ ファイルが無効です");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  const lvInfo = getLvInfo(data.totalXP);
  const [sceneIdx, setSceneIdx] = useState(0);
  const scene = SCENES[sceneIdx];
  // ヘッダー高さ: 景観80 + ステータス約78 + タブ約38 = 196
  const HEADER_H = 196;

  return (
    <div style={{ minHeight:"100vh", background:C.ground, ...PX, fontSize:10, color:C.text, maxWidth:480, margin:"0 auto" }}>
      <Toast msg={toast}/>
      {showEdit && <EditModal categories={data.categories} onSave={handleSaveCategories} onClose={()=>setShowEdit(false)}/>}

      {/* ═══ 固定ヘッダー ═══ */}
      <div style={{ position:"fixed", top:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, zIndex:100 }}>
        {/* アニメーション景観 */}
        <AnimatedLandscape onSceneChange={setSceneIdx} />

        {/* ステータスバー */}
        <div style={{
          background:`repeating-linear-gradient(0deg,${scene.tabActive} 0px,${scene.tabActive} 4px,${scene.tabBg} 4px,${scene.tabBg} 8px)`,
          borderBottom:`3px solid ${C.border}`,
          padding:"8px 12px",
          transition:"background 0.6s ease",
        }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:40,height:40,flexShrink:0,...pb(C.border,"#FFD700"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:20 }}>⚔️</div>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
                <span style={{ fontSize:10,color:scene.accent }}>LV.{lvInfo.level}</span>
                <span style={{ fontSize:9,color:scene.accent }}>💰{data.totalG}G</span>
              </div>
              <SmoothBar current={lvInfo.currentXP} total={lvInfo.neededXP} color={scene.accent} height={13}/>
              <div style={{ fontSize:7,color:"#FFFFFF99",marginTop:3 }}>{lvInfo.currentXP}/{lvInfo.neededXP} XP（計{data.totalXP}）</div>
            </div>
          </div>
        </div>

        {/* タブ */}
        <div style={{ display:"flex", background:scene.tabBg, borderBottom:`3px solid ${C.border}`, transition:"background 0.6s ease" }}>
          {[{key:"quest",label:"クエスト"},{key:"status",label:"ステータス"},{key:"log",label:"ログ"}].map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)} style={{
              flex:1, padding:"10px 4px",
              background:tab===t.key?scene.tabActive:"transparent",
              border:"none", borderBottom:tab===t.key?`3px solid ${scene.accent}`:"3px solid transparent",
              color:tab===t.key?scene.accent:"#FFFFFF88",
              ...PX, fontSize:8, cursor:"pointer",
              transition:"background 0.6s ease, color 0.6s ease, border-color 0.6s ease",
            }}>{t.label}</button>
          ))}
        </div>
      </div>

      {/* ═══ コンテンツ ═══ */}
      <div style={{ paddingTop:HEADER_H+8, paddingBottom:80, background:C.panel }}>

        {tab==="quest"&&(
          <div style={{ padding:"0 10px" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingTop:4 }}>
              <span style={{ fontSize:7,color:C.textMuted }}>📅 {today}</span>
              <div style={{ display:"flex", gap:6 }}>
                <button onClick={handleExport} style={{ ...PX,fontSize:6,...pb(C.border,"#1A5276"),color:C.white,padding:"5px 8px",cursor:"pointer" }}>📦 保存</button>
                <button onClick={()=>importRef.current?.click()} style={{ ...PX,fontSize:6,...pb(C.border,"#6B4F10"),color:C.white,padding:"5px 8px",cursor:"pointer" }}>📂 読込</button>
                <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImport}/>
                <button onClick={()=>setShowEdit(true)} style={{ ...PX,fontSize:6,...pb(C.border,C.grassDark),color:C.white,padding:"5px 8px",cursor:"pointer" }}>⚙ 編集</button>
              </div>
            </div>
            {data.categories.map(cat=>{
              const dailyIds=cat.id==="daily"?cat.missions.map(m=>m.id):[];
              const allDaily=cat.id==="daily"&&dailyIds.every(id=>todayChecked[id]!==undefined);
              return (
                <div key={cat.id} style={{ marginBottom:16 }}>
                  <div style={{ display:"flex",alignItems:"center",gap:6,padding:"6px 12px",marginBottom:6,background:cat.color+"22",borderLeft:`4px solid ${cat.color}`,border:`2px solid ${cat.color}55` }}>
                    <span style={{ fontSize:14 }}>{cat.icon}</span>
                    <span style={{ fontSize:9,color:cat.color }}>{cat.label}</span>
                    {cat.bonus&&<span style={{ marginLeft:"auto",fontSize:7,color:allDaily?C.green:C.textMuted }}>{allDaily?"✓ ":""}全達成+{cat.bonus}XP</span>}
                  </div>
                  {cat.missions.map(m=>{
                    const checked = todayChecked[m.id]!==undefined;
                    return (
                      <button key={m.id} onClick={()=>handleCheck(m.id,m.xp,!!m.dailyPart)} style={{
                        display:"flex",alignItems:"center",gap:10,
                        width:"100%",textAlign:"left",padding:"9px 12px",marginBottom:5,
                        background:checked?cat.color+"18":C.panel,
                        border:`2px solid ${checked?cat.color:C.borderLight}`,
                        boxShadow:checked?`2px 2px 0 ${cat.color}88`:`3px 3px 0 ${C.borderLight}`,
                        cursor:"pointer",...PX,fontSize:8,
                        transform:checked?"translate(1px,1px)":"none",
                        transition:"all 0.1s",
                      }}>
                        <div style={{ width:18,height:18,flexShrink:0,border:`2px solid ${checked?cat.color:C.border}`,background:checked?cat.color:C.white,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:C.white }}>
                          {checked&&"✓"}
                        </div>
                        <span style={{ flex:1,color:checked?cat.color:C.text,textDecoration:checked?"line-through":"none",lineHeight:1.7 }}>{m.label}</span>
                        {!m.dailyPart&&<span style={{ fontSize:8,fontWeight:"bold",flexShrink:0,color:m.penalty?C.red:C.green }}>{m.xp>0?`+${m.xp}`:m.xp}</span>}
                      </button>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}

        {tab==="status"&&(
          <div style={{ padding:"4px 10px" }}>
            <div style={{ ...pb(C.border,C.panel),padding:14,marginBottom:12 }}>
              <div style={{ fontSize:8,color:C.textMuted,marginBottom:12 }}>▶ PLAYER STATUS</div>
              {[
                {label:"LEVEL",  value:`LV.${lvInfo.level}`,              color:C.tech},
                {label:"TOTAL XP",value:`${data.totalXP} XP`,             color:C.xpColor},
                {label:"GOLD",   value:`${data.totalG} G`,                color:C.gold},
                {label:"NEXT LV",value:`残り${lvInfo.neededXP-lvInfo.currentXP}XP`,color:C.green},
              ].map(row=>(
                <div key={row.label} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px dashed ${C.borderLight}` }}>
                  <span style={{ fontSize:7,color:C.textMuted }}>{row.label}</span>
                  <span style={{ fontSize:10,color:row.color }}>{row.value}</span>
                </div>
              ))}
              <div style={{ marginTop:12 }}>
                <div style={{ fontSize:7,color:C.textMuted,marginBottom:6 }}>XP [{lvInfo.currentXP}/{lvInfo.neededXP}]</div>
                <SmoothBar current={lvInfo.currentXP} total={lvInfo.neededXP} color={C.xpColor} height={16}/>
              </div>
            </div>

            <div style={{ ...pb(C.border,C.panel),padding:14,marginBottom:12 }}>
              <div style={{ fontSize:8,color:C.textMuted,marginBottom:14 }}>▶ STATS</div>
              {data.categories.filter(c=>c.id!=="daily").map(cat=>{
                const catXP=data.catXP?.[cat.id]||0;
                const catLv=getCatLv(catXP);
                return (
                  <div key={cat.id} style={{ marginBottom:16 }}>
                    <div style={{ display:"flex",justifyContent:"space-between",marginBottom:5 }}>
                      <span style={{ fontSize:8,color:cat.color }}>{cat.icon} {cat.label}</span>
                      <span style={{ fontSize:8,color:cat.color }}>LV.{catLv.level}</span>
                    </div>
                    <SmoothBar current={catLv.currentXP} total={catLv.neededXP} color={cat.color} height={14}/>
                    <div style={{ fontSize:7,color:C.textMuted,marginTop:3,textAlign:"right" }}>{catLv.currentXP}/{catLv.neededXP} XP（計{catXP}）</div>
                  </div>
                );
              })}
            </div>

            <div style={{ ...pb(C.border,C.panel),padding:14 }}>
              <div style={{ fontSize:8,color:C.textMuted,marginBottom:12 }}>▶ LEVEL TABLE</div>
              {Array.from({length:10},(_,i)=>{
                const lv=i+1; let base=0;
                for(let j=1;j<lv;j++) base+=100+(j-1)*50;
                const end=base+100+(lv-1)*50-1;
                const isCur=lv===lvInfo.level;
                return (
                  <div key={lv} style={{ display:"flex",justifyContent:"space-between",padding:"6px 8px",marginBottom:4,background:isCur?"#FFF9C4":"transparent",border:isCur?`2px solid ${C.gold}`:"1px solid transparent",fontSize:7 }}>
                    <span style={{ color:isCur?C.ground:C.textMuted }}>LV.{lv}</span>
                    <span style={{ color:isCur?C.ground:C.textMuted }}>{base}～{lv===10?"∞":end}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="log"&&(
          <div style={{ padding:"4px 10px" }}>
            <div style={{ fontSize:8,color:C.textMuted,marginBottom:12 }}>▶ ACTIVITY LOG</div>
            {Object.entries(data.history).sort(([a],[b])=>b.localeCompare(a)).slice(0,30).map(([date,checked])=>{
              // ミッションIDからXPを逆引きして合計
              const missionMap = {};
              for (const cat of data.categories) {
                for (const m of cat.missions) {
                  missionMap[m.id] = m;
                }
              }
              let xpSum = 0;
              const checkedIds = Object.keys(checked).filter(id => checked[id]);
              for (const id of checkedIds) {
                const m = missionMap[id];
                if (m && !m.dailyPart) xpSum += m.xp;
              }
              const dailyCat = data.categories.find(c=>c.id==="daily");
              const allDaily = dailyCat?.missions.every(m=>checked[m.id]);
              const bonus = allDaily ? dailyCat?.bonus||10 : 0;
              const total = xpSum + bonus;
              // 完了件数（毎日タスク除く）
              const nonDailyIds = new Set(
                data.categories.filter(c=>c.id!=="daily").flatMap(c=>c.missions.map(m=>m.id))
              );
              const count = checkedIds.filter(id=>nonDailyIds.has(id)).length;
              return (
                <div key={date} style={{ ...pb(C.borderLight,C.panel),padding:"10px 12px",marginBottom:8 }}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:5 }}>
                    <span style={{ fontSize:8 }}>{date}</span>
                    <span style={{ fontSize:8,color:total>=0?C.green:C.red }}>{total>=0?"+":""}{total}XP</span>
                  </div>
                  <div style={{ fontSize:7,color:C.textMuted }}>
                    {count}件完了{allDaily&&<span style={{ color:C.gold,marginLeft:8 }}>🌿ボーナス</span>}
                  </div>
                </div>
              );
            })}
            {Object.keys(data.history).length===0&&(
              <div style={{ textAlign:"center",color:C.textMuted,fontSize:8,marginTop:40,lineHeight:2.5 }}>まだ記録がありません</div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


    // Mount
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(React.StrictMode, null,
        React.createElement(App, null)
      )
    );
  </script>
</body>
</html>
