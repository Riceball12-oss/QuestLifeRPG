// ═══ サウンドエンジン（Web Audio API）═══
const _audioCtxRef = { current: null };
function getAudioCtx() {
  if (!_audioCtxRef.current) {
    try { _audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtxRef.current;
}
function beep(freq, duration, type="square", volume=0.18, startDelay=0) {
  const ctx = getAudioCtx(); if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + startDelay);
  gain.gain.setValueAtTime(volume, ctx.currentTime + startDelay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startDelay + duration);
  osc.start(ctx.currentTime + startDelay);
  osc.stop(ctx.currentTime + startDelay + duration + 0.02);
}
// 通常チェック音（ピコッ↑）
function soundCheck() {
  beep(660, 0.05, "square", 0.14, 0);

}

const SCENE_DURATION = 8000;

function AnimatedLandscape({ onSceneChange }) {
  const [sceneIdx, setSceneIdx] = useState(0);
  const [fadeOut, setFadeOut] = useState(false);
  const [offset, setOffset] = useState(0);
  const rafRef = useRef(null);
  const lastTimeRef = useRef(null);
  const sceneTimerRef = useRef(null);

  useEffect(() => {
    const animate = (ts) => {
      if (lastTimeRef.current === null) lastTimeRef.current = ts;
      const dt = ts - lastTimeRef.current;
      lastTimeRef.current = ts;
      const speed = SCENES[sceneIdx].speed;
      setOffset(prev => (prev + speed * dt * 0.05) % 960);
      rafRef.current = requestAnimationFrame(animate);
    };
    rafRef.current = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(rafRef.current);
  }, [sceneIdx]);

  useEffect(() => {
    sceneTimerRef.current = setInterval(() => {
      setFadeOut(true);
      setTimeout(() => {
        setSceneIdx(prev => {
          const next = (prev + 1) % SCENES.length;
          onSceneChange && onSceneChange(next);
          return next;
        });
        setOffset(0);
        lastTimeRef.current = null;
        setFadeOut(false);
      }, 600);
    }, SCENE_DURATION);
    return () => clearInterval(sceneTimerRef.current);
  }, []);

  const scene = SCENES[sceneIdx];

  return (
    <div style={{ position:"relative", lineHeight:0, overflow:"hidden" }}>
      <svg
        width="480" height="80"
        viewBox="0 0 480 80"
        style={{
          display:"block",
          imageRendering:"pixelated",
          opacity: fadeOut ? 0 : 1,
          transition:"opacity 0.6s ease",
          width:"100%",
        }}
        xmlns="http://www.w3.org/2000/svg"
      >
        <scene.Component offset={offset}/>
      </svg>
      {/* シーンドット（中央） */}
      <div style={{
        position:"absolute", bottom:4, left:"50%", transform:"translateX(-50%)",
        display:"flex", gap:4,
      }}>
        {SCENES.map((s,i)=>(
          <div key={s.id} style={{
            width:4, height:4,
            background: i===sceneIdx ? "#FFD700" : "#FFFFFF55",
            border:"1px solid #FFFFFF44",
          }}/>
        ))}
      </div>
    </div>
  );
}

function getLvInfo(xp) {
  const x = Math.max(0, xp);
  let lv=1, base=0;
  while(true){
    const need = 100+(lv-1)*50;
    if(x < base+need) return { level:lv, currentXP:x-base, neededXP:need };
    base += need; lv++;
  }
}
function getCatLv(xp) {
  const x=Math.max(0,xp), lv=Math.min(Math.floor(x/50)+1,99);
  return { level:lv, currentXP:x%50, neededXP:50 };
}

// ═══ historyから全XPを再計算（single source of truth）═══
function recalcFromHistory(history, categories) {
  const missionMap = {};
  for (const cat of categories) {
    for (const m of cat.missions) missionMap[m.id] = m;
  }
  const dc = categories.find(c => c.id === "daily");
  let totalXP = 0;
  const catXP = {};

  for (const [date, checked] of Object.entries(history)) {
    let dayXP = 0;
    for (const id of Object.keys(checked)) {
      if (!checked[id]) continue;
      const m = missionMap[id];
      if (!m || m.dailyPart) continue;
      dayXP += m.xp;
      if (m.xp > 0 && missionMap[id]) {
        const cat = categories.find(c => c.missions.some(mm => mm.id === id));
        if (cat && cat.id !== "daily") {
          catXP[cat.id] = (catXP[cat.id] || 0) + m.xp;
        }
      }
    }
    // 毎日ボーナス
    if (dc?.missions.every(m => checked[m.id])) dayXP += dc.bonus || 10;
    totalXP += dayXP;
  }

  totalXP = Math.max(0, totalXP);
  return { totalXP, totalG: Math.floor(totalXP / 10), catXP };
}

function load() {

      return {
        history:    old.history    || {},

    }
  } catch{}
  return { history:{}, categories:DEFAULT_CATS };
}

// 日別XP計算ヘルパー
function calcDayXP(checked, categories) {
  if (!checked) return 0;
  const dc = categories.find(c => c.id === "daily");
  let xp = 0;
  for (const cat of categories) {
    for (const m of cat.missions) {
      if (!checked[m.id] || m.dailyPart) continue;
      xp += m.xp;
    }
  }
  if (dc?.missions.every(m => !!checked[m.id])) xp += dc.bonus || 10;
  return Math.max(0, xp);
}

// 30日間折れ線グラフ
function MonthLineChart({ history, categories }) {
  const W = 320, H = 80, PAD = 10;
  const points = [];
  const today = new Date();

  for (let i = 29; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = d.toISOString().slice(0,10);
    points.push({ key, xp: calcDayXP(history[key], categories), i: 29-i });
  }

  const maxXP = Math.max(...points.map(p => p.xp), 10);
  const toX = i => PAD + (i / 29) * (W - PAD*2);
  const toY = xp => H - PAD - (xp / maxXP) * (H - PAD*2);

  const pathD = points.map((p,i) => `${i===0?"M":"L"}${toX(p.i).toFixed(1)},${toY(p.xp).toFixed(1)}`).join(" ");
  const areaD = pathD + ` L${toX(29)},${H-PAD} L${toX(0)},${H-PAD} Z`;

  const todayPt = points[points.length-1];

  return (
    <div style={{ ...pb(C.border,C.panel), padding:"12px 10px", marginBottom:12 }}>
      <div style={{ fontSize:8, color:C.textMuted, marginBottom:10 }}>▶ 30日間XP推移</div>

        {/* グリッド */}
        {[0.25,0.5,0.75,1].map(r => (
          <line key={r} x1={PAD} y1={toY(maxXP*r)} x2={W-PAD} y2={toY(maxXP*r)}
            stroke={C.borderLight} strokeWidth="0.5" strokeDasharray="3,3" opacity="0.5"/>
        ))}
        {/* エリア */}
        <path d={areaD} fill={C.grass} opacity="0.15"/>
        {/* ライン */}
        <path d={pathD} fill="none" stroke={C.grass} strokeWidth="2" strokeLinejoin="round"/>
        {/* 今日の点 */}

        <text x={PAD} y={PAD} fill={C.textMuted} fontSize="7" fontFamily="monospace">{maxXP}XP</text>

// 今日の進捗リング
function TodayProgress({ todayChecked, categories }) {
  const nonDaily = categories.filter(c => c.id !== "daily").flatMap(c => c.missions);
  const done = nonDaily.filter(m => todayChecked[m.id]).length;
  const total = nonDaily.length;
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);

  const R = 14, CIRC = 2 * Math.PI * R;
  const dash = (pct / 100) * CIRC;

  return (
    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
      <svg width="36" height="36" viewBox="0 0 36 36">
        <circle cx="18" cy="18" r={R} fill="none" stroke={C.borderLight} strokeWidth="3"/>
        <circle cx="18" cy="18" r={R} fill="none" stroke="#FFD700" strokeWidth="3"
          strokeDasharray={`${dash} ${CIRC}`}
          strokeLinecap="square"
          transform="rotate(-90 18 18)"
          style={{ transition:"stroke-dasharray 0.5s ease" }}
        />
        <text x="18" y="22" textAnchor="middle" fill="#FFD700" fontSize="8" fontFamily="monospace">{pct}%</text>
      </svg>
      <div style={{ ...PX, fontSize:6, color:"#FFFFFF99", lineHeight:1.8 }}>
        <div>{done}/{total}</div>
        <div>完了</div>
      </div>
    </div>
  );
}

  try {

              const count = checkedIds.filter(id=>nonDailyIds.has(id)).length;
              return (
                <div key={date} style={{ ...pb(C.borderLight,C.panel),padding:"10px 12px",marginBottom:8 }}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:5 }}>
                    <span style={{ fontSize:8 }}>{date}</span>
                    <span style={{ fontSize:8,color:total>=0?C.green:C.red }}>{total>=0?"+":""}{total}XP</span>
                  </div>
                  <div style={{ fontSize:7,color:C.textMuted }}>
                    {count}件完了{allDaily&&<span style={{ color:C.gold,marginLeft:8 }}>🌿ボーナス</span>}
                  </div>
                </div>
              );
            })}
            {Object.keys(data.history).length===0&&(
              <div style={{ textAlign:"center",color:C.textMuted,fontSize:8,marginTop:40,lineHeight:2.5 }}>まだ記録がありません</div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(React.StrictMode, null, React.createElement(App, null))
    );
  </script>
</body>
</html>
